<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collins Oseko | IT Graduate & Systems Engineer</title>
    <meta name="description" content="Portfolio of Collins Oseko (Underated-Genius) - IT Graduate specializing in software engineering, systems design, and AI-assisted development">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
    
    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* Color System */
            --royal-amethyst: #6B46C1;
            --deep-purple: #553C9A;
            --platinum-silk: #E8E9F3;
            --soft-silver: #C7C9D9;
            --dark-bg: #0A0A0F;
            --dark-surface: #14141F;
            --glass-border: rgba(200, 200, 230, 0.1);
            --glass-bg: rgba(20, 20, 31, 0.7);
            --accent-glow: rgba(107, 70, 193, 0.4);
            
            /* Light Mode Colors */
            --light-bg: #F5F5FA;
            --light-surface: #FFFFFF;
            --light-text: #1A1A2E;
            --light-glass-bg: rgba(255, 255, 255, 0.7);
            --light-glass-border: rgba(107, 70, 193, 0.15);
            
            /* Typography */
            --font-display: 'Orbitron', monospace;
            --font-body: 'Outfit', sans-serif;
            
            /* Spacing */
            --section-padding: 8rem 2rem;
            --container-max: 1400px;
        }
        
        body {
            font-family: var(--font-body);
            background: var(--dark-bg);
            color: var(--platinum-silk);
            overflow-x: hidden;
            line-height: 1.6;
            transition: background 0.5s ease, color 0.5s ease;
        }
        
        body.light-mode {
            background: var(--light-bg);
            color: var(--light-text);
        }
        
        /* Glass morphism utility */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px var(--accent-glow);
            border-color: var(--royal-amethyst);
        }
        
        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        /* Start Screen */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle at center, var(--deep-purple), var(--dark-bg));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        
        .start-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        .start-screen h1 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            color: var(--platinum-silk);
            margin-bottom: 2rem;
            text-align: center;
            letter-spacing: 4px;
            text-shadow: 0 0 40px var(--accent-glow);
        }
        
        .start-button {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--platinum-silk);
            background: var(--royal-amethyst);
            border: 2px solid var(--platinum-silk);
            padding: 1.5rem 4rem;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px var(--accent-glow);
        }
        
        .start-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 60px var(--accent-glow);
        }
        
        /* Navigation */
        .nav-container {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 0.8rem 2rem;
            display: flex;
            gap: 2rem;
            transition: all 0.3s ease;
        }
        
        .nav-container a {
            color: var(--platinum-silk);
            text-decoration: none;
            font-family: var(--font-display);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            padding: 0.5rem 0;
        }
        
        .nav-container a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--royal-amethyst);
            transition: width 0.3s ease;
        }
        
        .nav-container a:hover::after,
        .nav-container a.active::after {
            width: 100%;
        }
        
        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1000;
            width: 50px;
            height: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .theme-toggle:hover {
            border-color: var(--royal-amethyst);
            box-shadow: 0 8px 24px var(--accent-glow);
            transform: rotate(180deg);
        }
        
        /* Car Container */
        .car-container {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 500;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .car-container.hidden {
            opacity: 0;
        }
        
        .vintage-car {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 10px 30px var(--accent-glow));
            transition: transform 0.1s ease;
        }
        
        /* Section Base */
        section {
            min-height: 100vh;
            padding: var(--section-padding);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        section.visible {
            opacity: 1;
        }
        
        .container {
            max-width: var(--container-max);
            width: 100%;
            margin: 0 auto;
        }
        
        /* Hero Section */
        .hero {
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at 30% 50%, rgba(107, 70, 193, 0.2), transparent 50%);
        }
        
        .hero-content {
            text-align: center;
            position: relative;
            z-index: 2;
        }
        
        .avatar-container {
            width: 180px;
            height: 180px;
            margin: 0 auto 2rem;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--royal-amethyst);
            box-shadow: 0 20px 60px var(--accent-glow);
            position: relative;
        }
        
        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(30%);
            transition: transform 0.5s ease;
        }
        
        .avatar-container:hover .avatar {
            transform: scale(1.1);
        }
        
        .hero h1 {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            color: var(--platinum-silk);
            margin-bottom: 0.5rem;
            letter-spacing: 3px;
            line-height: 1.1;
        }
        
        .real-name {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--royal-amethyst);
            margin-bottom: 1rem;
            font-weight: 300;
        }
        
        .hero .subtitle {
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: var(--soft-silver);
            font-weight: 300;
            margin-bottom: 0.5rem;
        }
        
        .hero .tagline {
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: var(--royal-amethyst);
            font-weight: 500;
            margin-bottom: 3rem;
            letter-spacing: 1px;
        }
        
        .location {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 3rem;
            color: var(--soft-silver);
            font-size: 1.1rem;
        }
        
        .cta-buttons {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-primary, .btn-secondary {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            padding: 1.2rem 3rem;
            border-radius: 50px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
        }
        
        .btn-primary {
            background: var(--royal-amethyst);
            color: var(--platinum-silk);
            border: 2px solid var(--royal-amethyst);
            box-shadow: 0 10px 40px var(--accent-glow);
        }
        
        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 60px var(--accent-glow);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--platinum-silk);
            border: 2px solid var(--royal-amethyst);
        }
        
        .btn-secondary:hover {
            background: var(--royal-amethyst);
            color: var(--platinum-silk);
            transform: translateY(-4px);
        }
        
        /* Story Section */
        .story-section {
            background: linear-gradient(180deg, var(--dark-bg) 0%, var(--dark-surface) 100%);
        }
        
        .section-title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 700;
            color: var(--royal-amethyst);
            text-align: center;
            margin-bottom: 4rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .story-timeline {
            display: flex;
            flex-direction: column;
            gap: 4rem;
            position: relative;
            padding-left: 3rem;
        }
        
        .story-timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, var(--royal-amethyst), transparent);
        }
        
        .story-item {
            position: relative;
            opacity: 0;
            transform: translateX(-50px);
            transition: all 0.8s ease;
        }
        
        .story-item.visible {
            opacity: 1;
            transform: translateX(0);
        }
        
        .story-item::before {
            content: '';
            position: absolute;
            left: -3.5rem;
            top: 0;
            width: 16px;
            height: 16px;
            background: var(--royal-amethyst);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        
        .story-item h3 {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--platinum-silk);
            margin-bottom: 1rem;
            font-weight: 600;
        }
        
        .story-item p {
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--soft-silver);
        }
        
        /* Skills Section */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        
        .skill-card {
            padding: 2rem;
            perspective: 1000px;
        }
        
        .skill-card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        
        .skill-card:hover .skill-card-inner {
            transform: rotateY(10deg) rotateX(10deg);
        }
        
        .skill-card h3 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: var(--royal-amethyst);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        
        .skill-tag {
            background: rgba(107, 70, 193, 0.2);
            border: 1px solid var(--royal-amethyst);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--platinum-silk);
            transition: all 0.3s ease;
        }
        
        .skill-tag:hover {
            background: var(--royal-amethyst);
            color: var(--platinum-silk);
            transform: scale(1.05);
        }
        
        /* Projects Section */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        
        .project-card {
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--royal-amethyst), var(--deep-purple));
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }
        
        .project-card:hover::before {
            transform: scaleX(1);
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }
        
        .project-card h3 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: var(--platinum-silk);
            font-weight: 600;
        }
        
        .project-card p {
            color: var(--soft-silver);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        
        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        
        .tech-badge {
            background: rgba(107, 70, 193, 0.15);
            padding: 0.4rem 0.8rem;
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--royal-amethyst);
            font-weight: 500;
        }
        
        .project-links {
            display: flex;
            gap: 1rem;
        }
        
        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--royal-amethyst);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            background: rgba(107, 70, 193, 0.1);
        }
        
        .project-link:hover {
            background: var(--royal-amethyst);
            color: var(--platinum-silk);
            transform: translateX(5px);
        }
        
        /* Experience Section */
        .experience-timeline {
            max-width: 900px;
            margin: 3rem auto;
        }
        
        .experience-item {
            padding: 2.5rem;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }
        
        .experience-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .experience-item h3 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: var(--royal-amethyst);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        .experience-item .role {
            font-size: 1.2rem;
            color: var(--platinum-silk);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .experience-item .period {
            color: var(--soft-silver);
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        
        .experience-item p {
            color: var(--soft-silver);
            line-height: 1.8;
        }
        
        /* Contact Section */
        .contact-content {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        
        .contact-card {
            padding: 3rem;
            margin-top: 3rem;
        }
        
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            align-items: start;
            gap: 0.5rem;
        }
        
        .form-group label {
            font-weight: 500;
            color: var(--platinum-silk);
            font-size: 1rem;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(107, 70, 193, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--platinum-silk);
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--royal-amethyst);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }
        
        .submit-btn {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 600;
            padding: 1.2rem 3rem;
            background: var(--royal-amethyst);
            color: var(--platinum-silk);
            border: 2px solid var(--royal-amethyst);
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px var(--accent-glow);
        }
        
        .submit-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 60px var(--accent-glow);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .form-status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 500;
        }
        
        .form-status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid #22c55e;
        }
        
        .form-status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }
        
        .social-link {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem 2rem;
            background: rgba(107, 70, 193, 0.15);
            border: 1px solid var(--royal-amethyst);
            border-radius: 50px;
            color: var(--platinum-silk);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .social-link:hover {
            background: var(--royal-amethyst);
            color: var(--platinum-silk);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }
        
        /* End Section */
        .end-section {
            background: radial-gradient(circle at center, var(--deep-purple), var(--dark-bg));
            text-align: center;
        }
        
        .end-section h2 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            color: var(--platinum-silk);
            margin-bottom: 2rem;
            letter-spacing: 4px;
            text-shadow: 0 0 60px var(--accent-glow);
        }
        
        .end-section p {
            font-size: 1.5rem;
            color: var(--soft-silver);
            margin-bottom: 3rem;
        }
        
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 999;
        }
        
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }
        
        .back-to-top:hover {
            border-color: var(--royal-amethyst);
            box-shadow: 0 8px 24px var(--accent-glow);
            transform: translateY(-5px);
        }
        
        /* CV Download Section */
        .cv-section {
            padding: 5rem 2rem;
            text-align: center;
        }
        
        .cv-preview {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            text-align: left;
        }
        
        .cv-header {
            border-bottom: 2px solid var(--royal-amethyst);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        
        .cv-section h2 {
            font-family: var(--font-display);
            color: var(--royal-amethyst);
            margin-bottom: 1rem;
        }
        
        .cv-section ul {
            list-style: none;
            padding-left: 0;
        }
        
        .cv-section li {
            margin-bottom: 0.5rem;
            padding-left: 1.5rem;
            position: relative;
        }
        
        .cv-section li:before {
            content: "▸";
            color: var(--royal-amethyst);
            position: absolute;
            left: 0;
        }
        
        /* Loading State */
        .loading {

                                        Contributed to backend microservices architecture for M-Pesa APIs, 
                                        implemented CI/CD pipelines using Jenkins, and optimized database 
                                        queries resulting in 40% performance improvement.
                                    </p>
                                </div>
                                <div className="experience-item glass-card">
                                    <h3>Freelance Full-Stack Developer</h3>
                                    <p className="role">Independent</p>
                                    <p className="period">2022 - Present | Remote</p>
                                    <p>
                                        Building custom web applications and automation tools for clients 
                                        across Africa and internationally. Specializing in full-stack development, 
                                        cloud deployment, and AI integration.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CV Section */}
                    <section id="cv" className="cv-section" ref={el => sectionsRef.current[5] = el}>
                        <div className="container">
                            <h2 className="section-title">Curriculum Vitae</h2>
                            <div className="cv-preview glass-card">
                                <div className="cv-header">
                                    <h1>{cvData.name}</h1>
                                    <h2>{cvData.title}</h2>
                                    <p>{cvData.contact.email} • {cvData.contact.phone} • {cvData.contact.location}</p>
                                </div>
                                
                                <h3>Education</h3>
                                {cvData.education.map((edu, index) => (
                                    <div key={index} style={{ marginBottom: '1.5rem' }}>
                                        <h4>{edu.degree}</h4>
                                        <p><strong>{edu.institution}</strong> | {edu.period}</p>
                                        <ul>
                                            {edu.achievements.map((achievement, i) => (
                                                <li key={i}>{achievement}</li>
                                            ))}
                                        </ul>
                                    </div>
                                ))}
                                
                                <h3>Technical Skills</h3>
                                <p><strong>Programming:</strong> {cvData.skills.technical.join(', ')}</p>
                                <p><strong>Soft Skills:</strong> {cvData.skills.soft.join(', ')}</p>
                                
                                <h3>Notable Projects</h3>
                                <ul>
                                    {cvData.projects.map((project, index) => (
                                        <li key={index}>{project}</li>
                                    ))}
                                </ul>
                                
                                <div style={{ textAlign: 'center', marginTop: '2rem' }}>
                                    <a href="#" className="btn-primary" download="Collins_Oseko_CV.pdf">
                                        <i className="fas fa-download"></i> Download CV (PDF)
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" ref={el => sectionsRef.current[6] = el}>
                        <div className="container contact-content">
                            <h2 className="section-title">Let's Connect</h2>
                            <div className="contact-card glass-card">
                                <form className="contact-form" onSubmit={handleSubmit}>
                                    <div className="form-group">
                                        <label htmlFor="name">Name</label>
                                        <input type="text" id="name" name="from_name" required />
                                    </div>
                                    <div className="form-group">
                                        <label htmlFor="email">Email</label>
                                        <input type="email" id="email" name="from_email" required />
                                    </div>
                                    <div className="form-group">
                                        <label htmlFor="message">Message</label>
                                        <textarea id="message" name="message" required></textarea>
                                    </div>
                                    <button type="submit" className="submit-btn">
                                        Send Message
                                    </button>
                                    {formStatus && (
                                        <div className={`form-status ${formStatus.type}`}>
                                            {formStatus.message}
                                        </div>
                                    )}
                                </form>

                                <div className="social-links">
                                    <a href="https://wa.me/254700000000" target="_blank" rel="noopener noreferrer" className="social-link">
                                        <i className="fab fa-whatsapp"></i> WhatsApp
                                    </a>
                                    <a href="https://linkedin.com/in/collinsoseko" target="_blank" rel="noopener noreferrer" className="social-link">
                                        <i className="fab fa-linkedin"></i> LinkedIn
                                    </a>
                                    <a href="https://github.com/underated-genius" target="_blank" rel="noopener noreferrer" className="social-link">
                                        <i className="fab fa-github"></i> GitHub
                                    </a>
                                    <a href="mailto:collins@underated-genius.com" className="social-link">
                                        <i className="fas fa-envelope"></i> Email
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* End Section */}
                    <section className="end-section" ref={el => sectionsRef.current[7] = el}>
                        <div className="container">
                            <h2>THANK YOU</h2>
                            <p>For joining me on this journey through technology and innovation</p>
                            <p style={{fontSize: '1.2rem', marginTop: '2rem', opacity: 0.9}}>
                                Built with passion, precision, and purpose
                            </p>
                            <p style={{fontSize: '1rem', marginTop: '1rem', opacity: 0.7}}>
                                React • GSAP • Modern Web Standards<br/>
                                Crafted in Nairobi, Kenya 🇰🇪
                            </p>
                            <div style={{ marginTop: '3rem' }}>
                                <a href="#home" className="btn-secondary" onClick={scrollToTop}>
                                    <i className="fas fa-arrow-up"></i> Back to Start
                                </a>
                            </div>
                        </div>
                    </section>
                </>
            );
        };

        // Render the app
        ReactDOM.render(<Portfolio />, document.getElementById('root'));
    </script>
</body>
</html>
