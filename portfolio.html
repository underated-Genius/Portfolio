<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio -Collins /t  IT Systems Engineer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-amethyst: #6B46C1;
            --deep-purple: #5B21B6;
            --platinum-silk: #E5E7EB;
            --dark-bg: #0A0A0F;
            --dark-secondary: #1A1A2E;
            --accent-glow: #A78BFA;
            --text-primary: #F9FAFB;
            --text-secondary: #D1D5DB;
            --glass-border: rgba(167, 139, 250, 0.2);
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Navigation */
        .nav-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1.5rem 2rem;
            backdrop-filter: blur(20px);
            background: rgba(10, 10, 15, 0.8);
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--royal-amethyst), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent-glow);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-glow);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Hero Section */
        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #hero-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 900px;
            padding: 2rem;
        }

        .hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--platinum-silk), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 0.3s;
        }

        .hero-role {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--text-secondary);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 0.6s;
        }

        .hero-tagline {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--text-secondary);
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 0.9s;
        }

        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 1.2s;
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--royal-amethyst), var(--deep-purple));
            color: var(--text-primary);
            box-shadow: 0 10px 30px rgba(107, 70, 193, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(107, 70, 193, 0.5);
        }

        .btn-secondary {
            background: var(--glass-bg);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: var(--glass-border);
            transform: translateY(-3px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glass Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.4s ease;
            position: relative;
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent-glow);
            box-shadow: 0 20px 60px rgba(107, 70, 193, 0.3);
        }

        /* Section */
        .section {
            min-height: 100vh;
            padding: 8rem 2rem;
            position: relative;
        }

        .section-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 3rem;
            text-align: center;
            background: linear-gradient(135deg, var(--platinum-silk), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Story Section */
        .story-content {
            display: grid;
            gap: 4rem;
        }

        .story-chapter {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
            opacity: 0;
        }

        .story-chapter.reverse {
            direction: rtl;
        }

        .story-chapter.reverse > * {
            direction: ltr;
        }

        .story-text h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--accent-glow);
        }

        .story-text p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .story-visual {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        /* Skills Grid */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .skill-category {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.4s ease;
        }

        .skill-category:hover {
            transform: translateY(-10px) rotateX(5deg);
            border-color: var(--accent-glow);
            box-shadow: 0 20px 60px rgba(107, 70, 193, 0.3);
        }

        .skill-category h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--accent-glow);
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .skill-tag {
            background: rgba(107, 70, 193, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .skill-tag:hover {
            background: var(--royal-amethyst);
            transform: scale(1.1);
        }

        /* Projects Section */
        .projects-filter {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.8rem 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--royal-amethyst);
            color: var(--text-primary);
            border-color: var(--accent-glow);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-glow);
            box-shadow: 0 20px 60px rgba(107, 70, 193, 0.3);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .project-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: var(--accent-glow);
            margin-bottom: 0.5rem;
        }

        .project-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .project-description {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tech-badge {
            background: rgba(107, 70, 193, 0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.85rem;
            border: 1px solid var(--glass-border);
        }

        .project-links {
            display: flex;
            gap: 1rem;
        }

        .project-link {
            color: var(--accent-glow);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .project-link:hover {
            color: var(--platinum-silk);
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 3rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--royal-amethyst), var(--accent-glow));
        }

        .timeline-item {
            position: relative;
            margin-bottom: 3rem;
            opacity: 0;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -3.5rem;
            top: 0;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: var(--accent-glow);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .timeline-content {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 2rem;
        }

        .timeline-date {
            color: var(--accent-glow);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .timeline-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .timeline-subtitle {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .timeline-description {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Contact Section */
        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        .contact-info {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
        }

        .contact-info h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--accent-glow);
        }

        .contact-info p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        .social-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem 1.5rem;
            background: rgba(107, 70, 193, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: var(--royal-amethyst);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(107, 70, 193, 0.4);
        }

        .contact-form {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-glow);
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .form-status {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            text-align: center;
        }

        .form-status.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #10B981;
        }

        .form-status.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #EF4444;
        }

        /* Loading Spinner */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent-glow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Download CV Button */
        .download-cv {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 999;
        }

        .download-cv .btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--royal-amethyst), var(--deep-purple));
            color: var(--text-primary);
            box-shadow: 0 10px 30px rgba(107, 70, 193, 0.4);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .download-cv .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(107, 70, 193, 0.6);
        }

        /* Responsive */
        @media (max-width: 968px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: rgba(10, 10, 15, 0.95);
                backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 2rem;
                border-bottom: 1px solid var(--glass-border);
            }

            .nav-links.active {
                display: flex;
            }

            .mobile-menu-btn {
                display: block;
            }

            .story-chapter {
                grid-template-columns: 1fr;
            }

            .contact-container {
                grid-template-columns: 1fr;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .download-cv {
                bottom: 1rem;
                right: 1rem;
            }
        }

        @media (max-width: 640px) {
            .section {
                padding: 5rem 1rem;
            }

            .cta-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Navigation Component
        const Navigation = () => {
            const [activeSection, setActiveSection] = useState('home');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    const sections = ['home', 'story', 'skills', 'projects', 'experience', 'contact'];
                    const scrollPosition = window.scrollY + 100;

                    for (let section of sections) {
                        const element = document.getElementById(section);
                        if (element) {
                            const offsetTop = element.offsetTop;
                            const height = element.offsetHeight;
                            if (scrollPosition >= offsetTop && scrollPosition < offsetTop + height) {
                                setActiveSection(section);
                                break;
                            }
                        }
                    }
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navItems = [
                { id: 'home', label: 'Home' },
                { id: 'story', label: 'Story' },
                { id: 'skills', label: 'Skills' },
                { id: 'projects', label: 'Projects' },
                { id: 'experience', label: 'Experience' },
                { id: 'contact', label: 'Contact' }
            ];

            return (
                <nav className="nav-container">
                    <div className="nav-content">
                        <div className="logo">PORTFOLIO</div>
                        <button 
                            className="mobile-menu-btn"
                            onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                        >
                            ☰
                        </button>
                        <ul className={`nav-links ${mobileMenuOpen ? 'active' : ''}`}>
                            {navItems.map(item => (
                                <li key={item.id}>
                                    <a 
                                        href={`#${item.id}`}
                                        className={activeSection === item.id ? 'active' : ''}
                                        onClick={() => setMobileMenuOpen(false)}
                                    >
                                        {item.label}
                                    </a>
                                </li>
                            ))}
                        </ul>
                    </div>
                </nav>
            );
        };

        // Hero Section with Three.js
        const HeroSection = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current) return;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ canvas: canvasRef.current, alpha: true });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.position.z = 5;

                // Create glowing geometry
                const geometry = new THREE.TorusKnotGeometry(1.5, 0.4, 100, 16);
                const material = new THREE.MeshPhongMaterial({
                    color: 0x6B46C1,
                    emissive: 0xA78BFA,
                    emissiveIntensity: 0.5,
                    shininess: 100,
                    transparent: true,
                    opacity: 0.8
                });
                const torusKnot = new THREE.Mesh(geometry, material);
                scene.add(torusKnot);

                // Add lights
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
                scene.add(ambientLight);
                
                const pointLight1 = new THREE.PointLight(0xA78BFA, 1, 100);
                pointLight1.position.set(5, 5, 5);
                scene.add(pointLight1);

                const pointLight2 = new THREE.PointLight(0x6B46C1, 1, 100);
                pointLight2.position.set(-5, -5, 5);
                scene.add(pointLight2);

                // Animation
                let mouseX = 0;
                let mouseY = 0;

                const handleMouseMove = (event) => {
                    mouseX = (event.clientX / window.innerWidth) * 2 - 1;
                    mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
                };

                window.addEventListener('mousemove', handleMouseMove);

                const animate = () => {
                    requestAnimationFrame(animate);
                    
                    torusKnot.rotation.x += 0.005;
                    torusKnot.rotation.y += 0.005;
                    
                    // Follow mouse
                    torusKnot.rotation.x += mouseY * 0.001;
                    torusKnot.rotation.y += mouseX * 0.001;
                    
                    renderer.render(scene, camera);
                };

                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };

                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    window.removeEventListener('mousemove', handleMouseMove);
                    renderer.dispose();
                };
            }, []);

            const scrollToProjects = () => {
                document.getElementById('projects').scrollIntoView({ behavior: 'smooth' });
            };

                    title: 'Learning',

                    title: 'Building',

                    icon: '🚀',
                    title: 'Engineering the Future',
                    text: 'Specializing in cloud-native development, AI-assisted workflows, and modern web technologies. Creating systems that are not just functional, but future-proof and innovative.'
                }

            return (

                        <h2 className="section-title">The Journey</h2>
                        <div className="story-content">
                            {chapters.map((chapter, index) => (

                'Frameworks & Tools': [
                    'React', 'Node.js', 'Next.js', 'Django', 'Flask', 'Express', 'FastAPI'

        // Projects Section with GitHub Integration
        const ProjectsSection = () => {
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState('all');
            const [error, setError] = useState(null);

            useEffect(() => {
                fetchGitHubProjects();
            }, []);

            const fetchGitHubProjects = async () => {
                try {
                    setLoading(true);
                    // Replace 'YOUR_GITHUB_USERNAME' with your actual GitHub username
                    const response = await fetch('https://api.github.com/users/underated-Genius/repos?sort=updated&per_page=12');
                    
                    if (!response.ok) throw new Error('Failed to fetch projects');
                    
                    const data = await response.json();
                    setProjects(data);
                    setError(null);
                } catch (err) {
                    console.error('Error fetching GitHub projects:', err);
                    setError('Unable to load projects. Please check back later.');
                    // Fallback demo projects
                    setProjects([
                        {
                            id: 1,
                            name: 'AI-Powered Chat System',
                            description: 'Real-time chat application with AI assistant integration using OpenAI API and WebSocket',
                            language: 'TypeScript',
                            stargazers_count: 45,
                            updated_at: '2024-01-15T10:30:00Z',
                            html_url: '#',
                            topics: ['react', 'nodejs', 'openai', 'websocket']
                        },
                        {
                            id: 2,
                            name: 'Cloud Infrastructure Manager',
                            description: 'Kubernetes-based microservices orchestration platform with automated scaling',
                            language: 'Python',
                            stargazers_count: 32,
                            updated_at: '2024-01-10T14:20:00Z',
                            html_url: '#',
                            topics: ['kubernetes', 'docker', 'aws', 'python']
                        },
                        {
                            id: 3,
                            name: 'Neural Network Visualizer',
                            description: 'Interactive tool for visualizing and debugging neural network architectures',
                            language: 'JavaScript',
                            stargazers_count: 28,
                            updated_at: '2024-01-05T09:15:00Z',
                            html_url: '#',
                            topics: ['tensorflow', 'react', 'threejs', 'd3']
                        }
                    ]);
                } finally {
                    setLoading(false);
                }
            };

            const getFilteredProjects = () => {
                if (filter === 'all') return projects;
                return projects.filter(p => p.language?.toLowerCase() === filter.toLowerCase());
            };

            const languages = ['all', ...new Set(projects.map(p => p.language).filter(Boolean))];

            return (
                <section id="projects" className="section">
                    <div className="section-container">
                        <h2 className="section-title">Featured Projects</h2>
                        
                        <div className="projects-filter">
                            {languages.map(lang => (
                                <button
                                    key={lang}
                                    className={`filter-btn ${filter === lang ? 'active' : ''}`}
                                    onClick={() => setFilter(lang)}
                                >
                                    {lang === 'all' ? 'All' : lang}
                                </button>
                            ))}
                        </div>

                        {loading ? (
                            <div className="loading-container">
                                <div className="spinner"></div>
                            </div>
                        ) : error ? (
                            <div style={{ textAlign: 'center', color: 'var(--text-secondary)' }}>
                                {error}
                            </div>
                        ) : (
                            <div className="projects-grid">
                                {getFilteredProjects().map(project => (
                                    <div key={project.id} className="project-card">
                                        <div className="project-header">
                                            <h3 className="project-title">{project.name}</h3>
                                        </div>
                                        <div className="project-stats">
                                            ⭐ {project.stargazers_count || 0} stars
                                            <span>•</span>
                                            <span>Updated {new Date(project.updated_at).toLocaleDateString()}</span>
                                        </div>
                                        <p className="project-description">
                                            {project.description || 'No description available'}
                                        </p>
                                        <div className="project-tech">
                                            {project.language && (
                                                <span className="tech-badge">{project.language}</span>
                                            )}
                                            {(project.topics || []).slice(0, 3).map(topic => (
                                                <span key={topic} className="tech-badge">{topic}</span>
                                            ))}
                                        </div>
                                        <div className="project-links">
                                            <a href={project.html_url} target="_blank" rel="noopener noreferrer" className="project-link">
                                                View on GitHub →
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </section>
            );
        };

        // Experience Section
        const ExperienceSection = () => {

            useEffect(() => {

                items.forEach((item, index) => {
                    gsap.fromTo(item,

                            duration: 0.8,
                            scrollTrigger: {
                                trigger: item,
                                start: 'top 85%',
                                toggleActions: 'play none none reverse'
                            }

                    );
                });
            }, []);

            const experiences = [
                {
                    date: '2024 - Present',
                    title: 'IT Graduate',
                    subtitle: 'Self-Driven Learning & Development',
                    description: 'Focused on building production-grade applications, mastering cloud-native technologies, and contributing to open-source projects. Specialized in full-stack development with modern frameworks and AI integration.'
                },
                {
                    date: '2020 - 2024',
                    title: 'Bachelor of Information Technology',
                    subtitle: 'University Education',
                    description: 'Completed comprehensive studies in software engineering, algorithms, database systems, and computer networks. Graduated with distinction and led multiple technical projects.'
                },
                {
                    date: '2023',
                    title: 'Freelance Developer',
                    subtitle: 'Independent Projects',
                    description: 'Delivered custom web applications and automation solutions for clients. Specialized in React, Node.js, and cloud deployment on AWS and Vercel.'
                },
                {
                    date: '2022',
                    title: 'Open Source Contributor',
                    subtitle: 'Community Engagement',
                    description: 'Active contributor to various open-source projects. Focused on improving documentation, fixing bugs, and implementing new features in popular JavaScript libraries.'
                }
            ];

            return (
                <section id="experience" className="section">
                    <div className="section-container">
                        <h2 className="section-title">Journey & Milestones</h2>
                        <div className="timeline" ref={timelineRef}>
                            {experiences.map((exp, index) => (
                                <div key={index} className="timeline-item">
                                    <div className="timeline-content">
                                        <div className="timeline-date">{exp.date}</div>
                                        <h3 className="timeline-title">{exp.title}</h3>
                                        <div className="timeline-subtitle">{exp.subtitle}</div>
                                        <p className="timeline-description">{exp.description}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // Contact Section
        const ContactSection = () => {
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                message: ''
            });
            const [status, setStatus] = useState({ type: '', message: '' });
            const [submitting, setSubmitting] = useState(false);

            const handleChange = (e) => {
                setFormData({
                    ...formData,
                    [e.target.name]: e.target.value
                });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                setStatus({ type: '', message: '' });

                // Simulate form submission (replace with actual email service)
                try {
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                    // For production, integrate with EmailJS or your backend
                    // Example: emailjs.send('service_id', 'template_id', formData, 'user_id')
                    
                    setStatus({
                        type: 'success',
                        message: 'Message sent successfully! I\'ll get back to you soon.'
                    });
                    setFormData({ name: '', email: '', message: '' });
                } catch (error) {
                    setStatus({
                        type: 'error',
                        message: 'Failed to send message. Please try again or contact me directly.'
                    });
                } finally {
                    setSubmitting(false);
                }
            };

            return (

                                        <span>📱</span> WhatsApp
                                    </a>
                                    <a href="https://instagram.com/underatedgenius" className="social-link" target="_blank" rel="noopener noreferrer">
                                        <span>📷</span> Instagram
                                    </a>
                                    <a href="https://twitter.com/redoxtitan" className="social-link" target="_blank" rel="noopener noreferrer">
                                        <span>𝕏</span> Twitter
                                    </a>
                                    <a href="mailto:coseko6@gmail.com" className="social-link">
                                        <span>✉️</span> Email
                                    </a>
                                    <a href="https://github.com/underated-Genius" className="social-link" target="_blank" rel="noopener noreferrer">
                                        <span>💻</span> GitHub
                                    </a>
                                    <a href="https://linkedin.com/in/yourusername" className="social-link" target="_blank" rel="noopener noreferrer">
                                        <span>💼</span> LinkedIn
                                    </a>
                                </div>
                            </div>
                            
                            <form className="contact-form" onSubmit={handleSubmit}>
                                {status.message && (
                                    <div className={`form-status ${status.type}`}>
                                        {status.message}
                                    </div>
                                )}
                                
                                <div className="form-group">
                                    <label htmlFor="name">Name</label>
                                    <input
                                        type="text"
                                        id="name"
                                        name="name"
                                        value={formData.name}
                                        onChange={handleChange}
                                        required
                                    />
                                </div>
                                
                                <div className="form-group">
                                    <label htmlFor="email">Email</label>
                                    <input
                                        type="email"
                                        id="email"
                                        name="email"
                                        value={formData.email}
                                        onChange={handleChange}
                                        required
                                    />
                                </div>
                                
                                <div className="form-group">
                                    <label htmlFor="message">Message</label>
                                    <textarea
                                        id="message"
                                        name="message"
                                        value={formData.message}
                                        onChange={handleChange}
                                        required
                                    ></textarea>
                                </div>
                                
                                <button 
                                    type="submit" 
                                    className="btn btn-primary"
                                    disabled={submitting}
                                    style={{ width: '100%' }}
                                >
                                    {submitting ? 'Sending...' : 'Send Message'}
                                </button>
                            </form>
                        </div>
                    </div>
                </section>
            );
        };

        // Download CV Component
        const DownloadCV = () => {
            const handleDownload = () => {
                // This will be replaced with actual CV download
                alert('CV download will be available soon. You can create a PDF version of your CV and link it here.');

            return (
                <div className="download-cv">
                    <button onClick={handleDownload} className="btn">
                        📄 Download CV
                    </button>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            useEffect(() => {
                // Initialize GSAP ScrollTrigger
                gsap.registerPlugin(ScrollTrigger);
            }, []);

            return (
                <>
                    <Navigation />
                    <HeroSection />
                    <StorySection />
                    <SkillsSection />
                    <ProjectsSection />
                    <ExperienceSection />
                    <ContactSection />
                    <DownloadCV />

        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
